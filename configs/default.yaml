# Default configuration for the AI Visual Production Toolkit

generation:
  default_model: sdxl
  default_steps: 30
  default_cfg_scale: 7
  default_sampler: "DPM++ 2M Karras"
  max_batch_size: 50
  output_format: png

postprocess:
  upscale: true
  upscale_factor: 2
  upscale_model: real-esrgan
  color_correction: true
  auto_crop: false

qc:
  min_score: 0.7
  auto_reject_below: 0.4
  require_human_review: true

delivery:
  default_format: png
  create_zip: true
  thumbnail_size: 300
